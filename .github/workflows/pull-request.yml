name: Pull request gate

on:
  pull_request:
    branches:
      - master
  merge_group:

permissions:
  contents: read

concurrency:
  group: pull-request-gate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Required test
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out the proposed revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Use Node.js 22
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
      - name: Install the ripgrep integration dependency
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends ripgrep
      - name: Install locked dependencies
        run: npm ci
      - name: Run the fast repository gate
        run: npm run ci

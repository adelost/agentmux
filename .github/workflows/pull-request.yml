name: Pull request gate

on:
  pull_request:
    branches:
      - master
  merge_group:

permissions:
  contents: read

concurrency:
  group: pull-request-gate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Required test
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out the proposed revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Use Node.js 22
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
      - name: Install the ripgrep integration dependency
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends ripgrep
      - name: Install locked dependencies
        run: npm ci
      - name: Put the proposed amux CLI on PATH
        run: |
          install -d "$RUNNER_TEMP/amux-bin"
          ln -s "$GITHUB_WORKSPACE/bin/agent-cli.mjs" "$RUNNER_TEMP/amux-bin/amux"
          echo "$RUNNER_TEMP/amux-bin" >> "$GITHUB_PATH"
      - name: Lint every file changed from trunk
        env:
          AMUX_LINT_BASE_REF: ${{ github.event.pull_request.base.sha || github.event.merge_group.base_sha }}
        run: amux lint --changed --strict
      - name: Run only the tests related to the changed files
        env:
          AMUX_TEST_BASE_REF: ${{ github.event.pull_request.base.sha || github.event.merge_group.base_sha }}
        run: node bin/focused-tests.mjs
      - name: Verify the CI contract itself
        run: node docs/check-ci-contract.mjs
